name: Publish npm package

# Publishes @librecode/i18n via OIDC trusted publishing.
# Fires automatically on tag push — no token needed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    name: Publish @librecode/i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned Node 24 LTS. Ships with npm 11.x, required for OIDC trusted
          # publishing (npm ≥ 11.5.1). Node 22 ships npm 10 which predates OIDC.
          node-version: "24.9.0"
          # NO registry-url — that writes an .npmrc with NODE_AUTH_TOKEN which
          # overrides OIDC. With just permissions: id-token: write, npm detects
          # the GitHub Actions OIDC token automatically.

      - name: Prepare package.json
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.startsWith('v') ? tag.slice(1) : pkg.version;
          pkg.version = version;
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode-i18n.git' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing @librecode/i18n@' + version);
          "

      - name: Publish (OIDC — no token)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@librecode/i18n@$VERSION" version 2>/dev/null; then
            echo "@librecode/i18n@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi
