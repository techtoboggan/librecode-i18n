name: Publish npm package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @librecode/i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare package.json for publish
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.startsWith('v') ? tag.slice(1) : pkg.version;
          pkg.version = version;
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode-i18n.git' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing @librecode/i18n@' + version);
          "

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
